<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - ページが見つかりません | ゆるいむくん</title>
  <meta name="robots" content="noindex">

    <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-primary: #ff8fab;
      --color-primary-dark: #ff6b8a;
      --color-bg: #fff5f7;
      --color-text: #4a4a4a;
      --color-text-light: #8a8a8a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .error-icon {
      font-size: 5rem;
      margin-bottom: 1rem;
    }

    .error-code {
      font-size: 4rem;
      font-weight: 700;
      color: var(--color-primary-dark);
      margin-bottom: 0.5rem;
    }

    .error-title {
      font-size: 1.25rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .error-message {
      font-size: 0.875rem;
      color: var(--color-text-light);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .home-link {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 500;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 15px rgba(255, 107, 138, 0.4);
    }

    .home-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 138, 0.5);
    }

    .home-link:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-icon">🎵</div>
    <h1 class="error-code">404</h1>
    <h2 class="error-title">ページが見つかりません</h2>
    <p class="error-message">
      お探しのページは存在しないか、<br>
      移動した可能性があります。
    </p>
    <a href="/" class="home-link">トップページへ戻る</a>
  </div>
</body>
</html>

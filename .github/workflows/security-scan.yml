name: Claude Code Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 毎週月曜 9:00 JST (0:00 UTC) に定期スキャン
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci --ignore-scripts
          fi

      # Claude Code Security スキャン
      - name: Run Claude Code Security Scan
        uses: anthropics/claude-code-security-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          scan_path: '.'
          severity_threshold: 'medium'
          report_format: 'sarif'
          output_file: 'security-results.sarif'
        continue-on-error: true

      # SARIF 結果を GitHub Security タブにアップロード
      - name: Upload SARIF results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-results.sarif
        continue-on-error: true

      # PRへのコメント投稿
      - name: Comment scan results on PR
        if: github.event_name == 'pull_request'
        uses: anthropics/claude-code-security-action/comment@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # 静的解析（無料・追加のセキュリティチェック）
  static-analysis:
    name: Static Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install security tools
        run: npm install -g retire@latest

      # 脆弱性のある依存パッケージを検出
      - name: Check for vulnerable dependencies (retire.js)
        run: |
          retire --path . --severity high --outputformat json > retire-results.json 2>&1 || true
          cat retire-results.json

      # シークレット・APIキーの漏洩チェック
      - name: Scan for exposed secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

      # HTML/JSのセキュリティヘッダーチェック
      - name: Check for security best practices
        run: |
          echo "=== Security Check Report ==="

          echo "--- Checking for inline event handlers (XSS risk) ---"
          grep -rn "on[a-z]*=['\"]" --include="*.html" . | grep -v "node_modules" | grep -v ".git" || echo "None found"

          echo "--- Checking for eval() usage ---"
          grep -rn "eval(" --include="*.js" . | grep -v "node_modules" | grep -v ".git" || echo "None found"

          echo "--- Checking for innerHTML assignments ---"
          grep -rn "innerHTML\s*=" --include="*.js" . | grep -v "node_modules" | grep -v ".git" || echo "None found"

          echo "--- Checking for hardcoded credentials ---"
          grep -rn -i "password\s*=\s*['\"]" --include="*.js" --include="*.html" . | grep -v "node_modules" | grep -v ".git" || echo "None found"
          grep -rn -i "api[_-]?key\s*[=:]\s*['\"]" --include="*.js" --include="*.html" . | grep -v "node_modules" | grep -v ".git" || echo "None found (Firebase config is client-side and expected)"

          echo "--- Checking for open CORS configuration ---"
          grep -rn "Access-Control-Allow-Origin.*\*" --include="*.js" . | grep -v "node_modules" | grep -v ".git" || echo "None found"

          echo "=== Check Complete ==="

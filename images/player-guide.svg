  <text x="88" y="96" fill="#FF6B8A" font-family="'Zen Maru Gothic', 'Hiragino Sans', sans-serif" font-size="28" font-weight="700" letter-spacing="0.08em">PLAYER GUIDE</text>
  <text x="88" y="148" fill="#332A2E" font-family="'Zen Maru Gothic', 'Hiragino Sans', sans-serif" font-size="56" font-weight="700">Yuruimukun Player Guide</text>
  <text x="88" y="194" fill="#705C64" font-family="'Zen Maru Gothic', 'Hiragino Sans', sans-serif" font-size="22">Pick a track, press play, then adjust seek and volume if needed.</text>


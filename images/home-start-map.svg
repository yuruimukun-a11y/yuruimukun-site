<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">ゆるいむくんの入り方</title>
  <desc id="desc">作業、夜、物語の3つの入口から選んで、ゆったり、通常、全曲のリストで再生する流れを示した図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdfd"/>
      <stop offset="100%" stop-color="#fff3f6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8fab"/>
      <stop offset="100%" stop-color="#ff5d8f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="620" rx="40" fill="url(#bg)"/>
  <text x="70" y="94" fill="#57313d" font-size="42" font-family="'Zen Maru Gothic', sans-serif" font-weight="700">気分から入る</text>
  <text x="70" y="138" fill="#7a5561" font-size="24" font-family="'Zen Maru Gothic', sans-serif">作業 / 夜 / 物語 から近い入口を選ぶだけ</text>

  <rect x="70" y="186" width="290" height="160" rx="28" fill="#ffffff" stroke="#f5bfd0" stroke-width="3"/>
  <text x="105" y="240" fill="#57313d" font-size="30" font-family="'Zen Maru Gothic', sans-serif" font-weight="700">作業</text>
  <text x="105" y="286" fill="#7a5561" font-size="24" font-family="'Zen Maru Gothic', sans-serif">じゃましないBGM</text>
  <text x="105" y="322" fill="#7a5561" font-size="20" font-family="'Zen Maru Gothic', sans-serif">集中したい時</text>

  <rect x="390" y="186" width="290" height="160" rx="28" fill="#ffffff" stroke="#f5bfd0" stroke-width="3"/>
  <text x="425" y="240" fill="#57313d" font-size="30" font-family="'Zen Maru Gothic', sans-serif" font-weight="700">夜</text>
  <text x="425" y="286" fill="#7a5561" font-size="24" font-family="'Zen Maru Gothic', sans-serif">静かに置ける曲</text>
  <text x="425" y="322" fill="#7a5561" font-size="20" font-family="'Zen Maru Gothic', sans-serif">眠る前や深夜</text>

  <rect x="710" y="186" width="290" height="160" rx="28" fill="#ffffff" stroke="#f5bfd0" stroke-width="3"/>
  <text x="745" y="240" fill="#57313d" font-size="30" font-family="'Zen Maru Gothic', sans-serif" font-weight="700">物語</text>
  <text x="745" y="286" fill="#7a5561" font-size="24" font-family="'Zen Maru Gothic', sans-serif">景色ごと聴く曲</text>
  <text x="745" y="322" fill="#7a5561" font-size="20" font-family="'Zen Maru Gothic', sans-serif">夕方や幻想寄り</text>

  <path d="M215 378 C215 448, 215 448, 600 448" fill="none" stroke="#ff7ea1" stroke-width="10" stroke-linecap="round"/>
  <path d="M535 378 C535 448, 535 448, 600 448" fill="none" stroke="#ff7ea1" stroke-width="10" stroke-linecap="round"/>
  <path d="M855 378 C855 448, 855 448, 600 448" fill="none" stroke="#ff7ea1" stroke-width="10" stroke-linecap="round"/>

  <rect x="410" y="404" width="380" height="148" rx="34" fill="url(#accent)"/>
  <text x="490" y="466" fill="#ffffff" font-size="34" font-family="'Zen Maru Gothic', sans-serif" font-weight="700">ゆったり / 通常 / 全曲</text>
  <text x="500" y="512" fill="#fff5f7" font-size="22" font-family="'Zen Maru Gothic', sans-serif">選んで再生、必要ならジャンルで絞る</text>

  <circle cx="1060" cy="478" r="72" fill="#ffffff" stroke="#f5bfd0" stroke-width="4"/>
  <polygon points="1038,440 1100,478 1038,516" fill="#ff6b8a"/>
  <text x="1014" y="579" fill="#7a5561" font-size="22" font-family="'Zen Maru Gothic', sans-serif">すぐ再生</text>
</svg>
